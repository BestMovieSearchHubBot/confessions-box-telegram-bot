<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Affiliate Program</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .link {
            background: var(--tg-theme-bg-color, #eef2ff);
            padding: 12px;
            border-radius: 12px;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
            margin: 15px 0;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
        }
        .btn {
            background: var(--tg-theme-button-color, #2c6bff);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn:active {
            opacity: 0.8;
        }
        .earnings {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
            color: var(--tg-theme-text-color, #000);
        }
        .terms {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
            margin-top: 20px;
            text-align: center;
        }
        .commission {
            font-size: 20px;
            font-weight: bold;
            color: #4caf50;
        }
        hr {
            margin: 20px 0;
            border-color: var(--tg-theme-hint-color, #eee);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>🤝 Affiliate Program</h2>
            <p>Earn <span class="commission">15%</span> commission when friends spend Stars!</p>
            <p>App's daily revenue per user: <span style="color: green;">🟢 0.02</span></p>
            <hr>
            <p>Your referral link:</p>
            <div id="referralLink" class="link">Loading...</div>
            <button id="copyBtn" class="btn">🔗 Copy Link</button>
            <div id="earningsDisplay" class="earnings"></div>
            <button id="joinBtn" class="btn">Join Program</button>
            <div class="terms">By joining, you agree to the Terms and Conditions.</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const initData = tg.initDataUnsafe;
        const userId = initData.user ? initData.user.id : null;

        async function fetchAffiliateData() {
            if (!userId) {
                document.getElementById('referralLink').innerText = "Unable to get user data.";
                return;
            }
            try {
                const response = await fetch(`/api/affiliate/${userId}`);
                if (!response.ok) throw new Error('Failed');
                const data = await response.json();
                document.getElementById('referralLink').innerText = data.referralLink;
                document.getElementById('earningsDisplay').innerHTML = `Total earned: ${data.earningsStars} Stars`;
            } catch (err) {
                console.error(err);
                document.getElementById('referralLink').innerText = "Error loading data. Try again later.";
            }
        }

        fetchAffiliateData();

        document.getElementById('copyBtn').addEventListener('click', () => {
            const link = document.getElementById('referralLink').innerText;
            if (link && link !== "Loading..." && link !== "Error loading data. Try again later.") {
                navigator.clipboard.writeText(link).then(() => {
                    tg.showAlert("✅ Link copied!");
                }).catch(() => {
                    tg.showAlert("Copy manually");
                });
            } else {
                tg.showAlert("No link available yet.");
            }
        });

        document.getElementById('joinBtn').addEventListener('click', () => {
            fetch(`/api/affiliate/join/${userId}`, { method: 'POST' }).catch(e => console.log(e));
            tg.showAlert("You have joined the affiliate program! Share your link to start earning.");
        });
    </script>
</body>
</html>
